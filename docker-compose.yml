version: "3.8"

services:
  join-backend:
    build: .
    container_name: join_backend
    restart: unless-stopped

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Database__Path: /app/data/join.db

    ports:
      - "127.0.0.1:8002:8080"

    volumes:
      - ./data:/app/data
